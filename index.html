<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SpaceShare</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI, sans-serif;
}

body{
background:#020617;
color:white;
overflow-x:hidden;
}

/* ---------- STAR BACKGROUND ---------- */

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

/* ---------- HERO ---------- */

.hero{

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

height:100vh;

text-align:center;

}

h1{

font-size:64px;

background:linear-gradient(90deg,#38bdf8,#818cf8);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;

}

.subtitle{

opacity:0.7;
margin-top:10px;
margin-bottom:40px;

}

/* ---------- ORBIT ANIMATION ---------- */

.orbit-container{

position:relative;
width:220px;
height:220px;
margin-top:30px;

}

.logo{

width:100px;
height:100px;

background:linear-gradient(135deg,#38bdf8,#6366f1);
border-radius:20px;

display:flex;
align-items:center;
justify-content:center;

font-size:32px;
font-weight:bold;

margin:auto;

}

.orbit{

position:absolute;
width:100%;
height:100%;

border:1px dashed rgba(255,255,255,0.1);

border-radius:50%;

animation:spin 12s linear infinite;

}

.satellite{

position:absolute;

top:-6px;
left:50%;

width:12px;
height:12px;

background:#38bdf8;

border-radius:50%;

}

@keyframes spin{

from{transform:rotate(0deg);}
to{transform:rotate(360deg);}

}

/* ---------- BUTTONS ---------- */

.buttons{

margin-top:40px;
display:flex;
gap:20px;

}

.btn{

padding:14px 26px;
border-radius:10px;

text-decoration:none;
font-weight:600;

transition:0.25s;

}

.download{

background:#38bdf8;
color:#020617;

}

.download:hover{

background:#0ea5e9;
transform:translateY(-2px);

}

.github{

background:#1e293b;

}

.github:hover{

background:#334155;

}

/* ---------- DEMO SECTION ---------- */

.demo{

margin-top:120px;
padding:60px;

text-align:center;

}

.demo h2{

font-size:36px;
margin-bottom:40px;

}

.demo img{

width:900px;
max-width:95%;

border-radius:12px;

box-shadow:0 20px 60px rgba(0,0,0,0.6);

}

footer{

margin-top:100px;
padding:30px;
text-align:center;
opacity:0.5;

}

</style>
</head>

<body>

<canvas id="stars"></canvas>

<section class="hero">

<h1>SpaceShare</h1>
<div class="subtitle">Fast LAN File Sharing Server</div>

<div class="orbit-container">

<div class="orbit">
<div class="satellite"></div>
</div>

<div class="logo">
S
</div>

</div>

<div class="buttons">

<a class="btn download" href="https://github.com/YOUR_USERNAME/SpaceShare/releases">
Download EXE
</a>

<a class="btn github" href="https://github.com/YOUR_USERNAME/SpaceShare">
GitHub
</a>

</div>

</section>

<section class="demo">

<h2>Interface Preview</h2>

<img src="screenshot.png">

</section>

<footer>

SpaceShare • Open Source LAN File Sharing

</footer>

<script>

/* ---------- STAR PARTICLES ---------- */

const canvas = document.getElementById("stars")
const ctx = canvas.getContext("2d")

canvas.width = window.innerWidth
canvas.height = window.innerHeight

let stars = []

for(let i=0;i<200;i++){

stars.push({

x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2,
speed:Math.random()*0.3

})

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height)

stars.forEach(star=>{

star.y+=star.speed

if(star.y>canvas.height){
star.y=0
}

ctx.fillStyle="white"
ctx.fillRect(star.x,star.y,star.size,star.size)

})

requestAnimationFrame(draw)

}

draw()

</script>

</body>
</html>
